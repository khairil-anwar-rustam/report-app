<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telecom CAD WORKING</title>

<script src="https://unpkg.com/konva@9/konva.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#0f172a;
  font-family:Arial;
  color:white;
}

#top{
  height:55px;
  background:#111827;
  display:flex;
  gap:6px;
  align-items:center;
  padding:6px;
}

button,input,select{
  padding:6px;
  border-radius:6px;
  border:none;
  background:#1e293b;
  color:white;
}

#wrap{
  display:flex;
  height:calc(100vh - 55px);
}

#side{
  width:200px;
  background:#111827;
  padding:10px;
}

#canvas{
  flex:1;
  background:#1e293b;
}
</style>
</head>

<body>

<div id="top">

<input type="file" id="file">

<select id="tool">
<option value="select">Select</option>
<option value="fiber">Fiber</option>
<option value="network">Network</option>
<option value="cctv">CCTV</option>
<option value="power">Power</option>
</select>

<input id="cores" type="number" value="12" min="1" max="144">

<button onclick="exportPDF()">Export</button>
<button onclick="clearAll()">Clear</button>

</div>

<div id="wrap">

<div id="side">
<button onclick="addDevice('📷 CCTV')">Camera</button>
<button onclick="addDevice('🗄 Rack')">Rack</button>
<button onclick="addDevice('🖧 Switch')">Switch</button>
<button onclick="addDevice('📡 Router')">Router</button>
<button onclick="addDevice('📶 AP')">WiFi</button>
<button onclick="addDevice('💽 NVR')">NVR</button>
</div>

<div id="canvas"></div>

</div>

<script>

/* ================= STAGE ================= */

const stage = new Konva.Stage({
  container:'canvas',
  width:window.innerWidth,
  height:window.innerHeight,
  draggable:true
});

const bgLayer = new Konva.Layer();
const cableLayer = new Konva.Layer();
const deviceLayer = new Konva.Layer();

stage.add(bgLayer);
stage.add(cableLayer);
stage.add(deviceLayer);

/* ================= COLORS ================= */

const colors=['red','blue','yellow','green','orange','purple','cyan','magenta'];

/* ================= STATE ================= */

let tool='select';
let drawing=false;
let active=null;

/* ================= TOOL ================= */

document.getElementById('tool').onchange=(e=>{
  tool=e.target.value;
});

/* ================= DRAW START ================= */

stage.on('mousedown touchstart',()=>{

  if(tool==='select') return;

  const pos=stage.getPointerPosition();

  if(tool==='fiber'){

    const cores=parseInt(document.getElementById('cores').value);

    const group=new Konva.Group({draggable:true});

    for(let i=0;i<cores;i++){

      const line=new Konva.Line({
        points:[pos.x,pos.y+i*3,pos.x,pos.y+i*3],
        stroke:colors[i%colors.length],
        strokeWidth:2
      });

      group.add(line);

    }

    cableLayer.add(group);
    active=group;

  }else{

    let color='white';
    let w=3;

    if(tool==='network') color='deepskyblue';
    if(tool==='cctv') color='limegreen';
    if(tool==='power'){color='red'; w=5;}

    active=new Konva.Line({
      points:[pos.x,pos.y,pos.x,pos.y],
      stroke:color,
      strokeWidth:w
    });

    cableLayer.add(active);

  }

  drawing=true;

});

/* ================= DRAW MOVE ================= */

stage.on('mousemove touchmove',()=>{

  if(!drawing || !active) return;

  const pos=stage.getPointerPosition();

  if(tool==='fiber'){

    active.getChildren().forEach((l,i)=>{

      const p=l.points();

      l.points([p[0],p[1],pos.x,pos.y+i*3]);

    });

  }else{

    const p=active.points();

    active.points([p[0],p[1],pos.x,pos.y]);

  }

  cableLayer.batchDraw();

});

/* ================= END DRAW ================= */

stage.on('mouseup touchend',()=>{
  drawing=false;
  active=null;
});

/* ================= DEVICE ================= */

function addDevice(txt){

  const g=new Konva.Group({
    x:200,y:200,
    draggable:true
  });

  const box=new Konva.Rect({
    width:60,
    height:60,
    fill:'#111827',
    stroke:'#38bdf8'
  });

  const t=new Konva.Text({
    text:txt,
    fontSize:18,
    fill:'white',
    x:5,y:20
  });

  g.add(box);
  g.add(t);
  deviceLayer.add(g);

}

/* ================= UPLOAD ================= */

document.getElementById('file').onchange=(e=>{

  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();

  reader.onload=(ev=>{

    const img=new Image();

    img.onload=()=>{

      bgLayer.destroyChildren();

      const bg=new Konva.Image({
        image:img,
        x:0,
        y:0,
        width:stage.width(),
        height:stage.height()
      });

      bgLayer.add(bg);
      bgLayer.draw();

    };

    img.src=ev.target.result;

  });

  reader.readAsDataURL(file);

});

/* ================= CLEAR ================= */

function clearAll(){
  cableLayer.destroyChildren();
  deviceLayer.destroyChildren();
}

/* ================= EXPORT ================= */

function exportPDF(){

  const data=stage.toDataURL({pixelRatio:2});

  const {jsPDF}=window.jspdf;

  const pdf=new jsPDF('landscape','px',[stage.width(),stage.height()]);

  pdf.addImage(data,'PNG',0,0,stage.width(),stage.height());

  pdf.save('cad.pdf');

}

/* ================= RESIZE ================= */

window.addEventListener('resize',()=>{

  stage.width(window.innerWidth);
  stage.height(window.innerHeight);

});

</script>

</body>
  </html>
