<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Report Pro</title>

<!-- Cropper -->
<link href="https://unpkg.com/cropperjs/dist/cropper.min.css" rel="stylesheet"/>
<script src="https://unpkg.com/cropperjs"></script>

<!-- Sortable -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ================= MOBILE FIRST UI ================= */

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 12px;
  max-width: 600px;
  margin: auto;
}

h2 {
  text-align: center;
  font-size: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

textarea {
  height: 80px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-size: 15px;
}

/* ===== GALLERY ===== */
#gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 10px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 12px;
}

.card img {
  width: 100%;
  border-radius: 10px;
  height: 180px;
  object-fit: cover;
}

.row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.row button {
  flex: 1;
  font-size: 12px;
  padding: 8px;
  background: #334155;
}

/* ===== MODAL ===== */
#cropModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#cropModal img {
  max-width: 90%;
  max-height: 70vh;
}

.modalBtn {
  width: 90%;
  margin-top: 10px;
  background: #22c55e;
}

.cancel {
  background: #ef4444;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 Job Report</h2>

<input id="title" placeholder="Job Title">
<textarea id="desc" placeholder="Job Description"></textarea>

<input type="file" id="images" multiple accept="image/*">

<div id="gallery"></div>

<button onclick="generatePDF()">📥 Generate PDF</button>

</div>

<!-- Crop Modal -->
<div id="cropModal">
  <img id="cropImage">
  <button class="modalBtn" onclick="cropSave()">Save Crop</button>
  <button class="modalBtn cancel" onclick="closeCrop()">Cancel</button>
</div>

<script>
const { jsPDF } = window.jspdf;

let imagesData = [];
let cropper;
let currentIndex = null;

/* ================= UPLOAD ================= */
document.getElementById("images").addEventListener("change", async (e) => {
  for (let file of e.target.files) {
    const base64 = await toBase64(file);
    imagesData.push({
      edited: base64,
      type: "before"
    });
  }
  render();
});

function toBase64(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}

/* ================= UI ================= */
function render() {
  const g = document.getElementById("gallery");
  g.innerHTML = "";

  imagesData.forEach((img, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${img.edited}">
      <div class="row">
        <button onclick="toggleType(${i})">${img.type.toUpperCase()}</button>
        <button onclick="openCrop(${i})">Crop</button>
      </div>
      <div class="row">
        <button onclick="rotate(${i})">Rotate</button>
        <button onclick="removeImg(${i})">Delete</button>
      </div>
    `;

    g.appendChild(div);
  });

  new Sortable(g, {
    animation: 150,
    onEnd: () => {
      const newOrder = [];
      document.querySelectorAll(".card").forEach((_, i) => {
        newOrder.push(imagesData[i]);
      });
      imagesData = newOrder;
    }
  });
}

/* ================= ACTIONS ================= */
function toggleType(i) {
  imagesData[i].type = imagesData[i].type === "before" ? "after" : "before";
  render();
}

function removeImg(i) {
  imagesData.splice(i, 1);
  render();
}

function rotate(i) {
  const img = new Image();
  img.src = imagesData[i].edited;

  img.onload = () => {
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");

    c.width = img.height;
    c.height = img.width;

    ctx.translate(c.width/2, c.height/2);
    ctx.rotate(Math.PI/2);
    ctx.drawImage(img, -img.width/2, -img.height/2);

    imagesData[i].edited = c.toDataURL("image/jpeg");
    render();
  };
}

/* ================= CROP ================= */
function openCrop(i) {
  currentIndex = i;
  document.getElementById("cropModal").style.display = "flex";

  const img = document.getElementById("cropImage");
  img.src = imagesData[i].edited;

  cropper = new Cropper(img, { viewMode: 1 });
}

function cropSave() {
  const canvas = cropper.getCroppedCanvas();
  imagesData[currentIndex].edited = canvas.toDataURL("image/jpeg");

  closeCrop();
  render();
}

function closeCrop() {
  cropper.destroy();
  document.getElementById("cropModal").style.display = "none";
}

/* ================= PAIRS ================= */
function getPairs() {
  const b = imagesData.filter(i => i.type === "before");
  const a = imagesData.filter(i => i.type === "after");

  const max = Math.max(b.length, a.length);
  const pairs = [];

  for (let i = 0; i < max; i++) {
    pairs.push({ before: b[i], after: a[i] });
  }
  return pairs;
}

/* ================= PDF ================= */
function generatePDF() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  if (!title || !desc) return alert("Fill all fields");

  const pdf = new jsPDF("p","mm","a4");

  const margin = 10;
  const w = 210;

  const imgW = (w - margin*3)/2;
  const imgH = 80;

  const pairs = getPairs();

  let page = 1;

  for (let i = 0; i < pairs.length; i += 2) {

    if (i !== 0) pdf.addPage();

    pdf.setFontSize(14);
    pdf.text(title, margin, 15);

    pdf.setFontSize(10);
    pdf.text(desc, margin, 22, {maxWidth:180});

    let y = 35;

    draw(pdf, pairs[i], y, imgW, imgH, margin);

    if (pairs[i+1]) {
      draw(pdf, pairs[i+1], y + imgH + 20, imgW, imgH, margin);
    }

    pdf.text("Page " + page++, 180, 290);
  }

  pdf.save("job-report.pdf");
}

function draw(pdf, p, y, w, h, m) {
  pdf.text("Before", m, y);
  pdf.text("After", m + w + m, y);

  y += 5;

  if (p.before)
    pdf.addImage(p.before.edited,"JPEG",m,y,w,h);

  if (p.after)
    pdf.addImage(p.after.edited,"JPEG",m+w+m,y,w,h);

  pdf.rect(m,y,w,h);
  pdf.rect(m+w+m,y,w,h);
}
</script>

</body>
  </html>
