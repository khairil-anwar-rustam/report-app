<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Network Layout PDF Editor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/konva/9.3.11/konva.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

#app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

#toolbar{
  height:60px;
  background:#111827;
  display:flex;
  align-items:center;
  padding:10px;
  gap:10px;
  border-bottom:1px solid #1e293b;
  overflow-x:auto;
}

button,select,input{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
}

button:hover{
  background:#38bdf8;
  cursor:pointer;
}

#main{
  display:flex;
  flex:1;
}

#sidebar{
  width:260px;
  background:#111827;
  border-right:1px solid #1e293b;
  overflow-y:auto;
  padding:15px;
}

#canvas-container{
  flex:1;
  overflow:auto;
  background:#1e293b;
  position:relative;
}

#stage-parent{
  width:3000px;
  height:2000px;
  margin:20px;
  background:white;
}

.section{
  margin-bottom:25px;
}

.section h3{
  margin-bottom:10px;
  color:#38bdf8;
}

.device-btn{
  width:100%;
  margin-bottom:8px;
  text-align:left;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.color-box{
  width:20px;
  height:20px;
  border-radius:4px;
}

#properties{
  position:absolute;
  right:20px;
  top:20px;
  width:220px;
  background:#111827;
  padding:15px;
  border-radius:12px;
  border:1px solid #334155;
  z-index:10;
}

#properties h3{
  margin-bottom:10px;
}

#properties input{
  width:100%;
  margin-bottom:10px;
}

.mobile-note{
  display:none;
}

@media(max-width:768px){
  #sidebar{
    width:180px;
  }

  .mobile-note{
    display:block;
    color:#f59e0b;
    font-size:12px;
    margin-top:10px;
  }
}
</style>
</head>
<body>

<div id="app">

<div id="toolbar">

<input type="file" id="pdfUpload" accept="application/pdf,image/*" />

<button onclick="setTool('select')">Select</button>
<button onclick="setTool('fiber')">Fiber Line</button>
<button onclick="setTool('network')">Network Line</button>
<button onclick="setTool('cctv')">CCTV Line</button>
<button onclick="setTool('power')">Power Line</button>
<button onclick="setTool('measure')">Measure</button>
<button onclick="undo()">Undo</button>
<button onclick="redo()">Redo</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="exportPDF()">Export PDF</button>

</div>

<div id="main">

<div id="sidebar">

<div class="section">
<h3>Devices</h3>

<button class="device-btn" onclick="addDevice('camera')">📷 CCTV Camera</button>
<button class="device-btn" onclick="addDevice('ptz')">🎥 PTZ Camera</button>
<button class="device-btn" onclick="addDevice('rack')">🗄 Rack</button>
<button class="device-btn" onclick="addDevice('switch')">🖧 Switch</button>
<button class="device-btn" onclick="addDevice('router')">📡 Router</button>
<button class="device-btn" onclick="addDevice('wifi')">📶 WiFi AP</button>
<button class="device-btn" onclick="addDevice('door')">🚪 Access Door</button>
<button class="device-btn" onclick="addDevice('barrier')">⛔ Barrier Gate</button>
<button class="device-btn" onclick="addDevice('nvr')">💽 NVR</button>
<button class="device-btn" onclick="addDevice('manhole')">⭕ Manhole</button>
<button class="device-btn" onclick="addDevice('pole')">📍 Pole</button>

</div>

<div class="section">
<h3>Legend</h3>

<div class="legend-item">
<div class="color-box" style="background:orange"></div>
<span>Fiber Optic</span>
</div>

<div class="legend-item">
<div class="color-box" style="background:deepskyblue"></div>
<span>Network Cable</span>
</div>

<div class="legend-item">
<div class="color-box" style="background:limegreen"></div>
<span>CCTV Cable</span>
</div>

<div class="legend-item">
<div class="color-box" style="background:red"></div>
<span>Power Cable</span>
</div>

</div>

<div class="section">
<h3>Layers</h3>

<button class="device-btn" onclick="toggleLayer('fiber')">Toggle Fiber</button>
<button class="device-btn" onclick="toggleLayer('network')">Toggle Network</button>
<button class="device-btn" onclick="toggleLayer('cctv')">Toggle CCTV</button>
<button class="device-btn" onclick="toggleLayer('power')">Toggle Power</button>
<button class="device-btn" onclick="toggleLayer('devices')">Toggle Devices</button>

<div class="mobile-note">
Use two fingers to zoom browser on mobile.
</div>

</div>

</div>

<div id="canvas-container">

<div id="properties">
<h3>Properties</h3>
<input id="deviceName" placeholder="Device Name" />
<input id="deviceIP" placeholder="IP Address" />
<input id="deviceNote" placeholder="Notes" />
</div>

<div id="stage-parent"></div>

</div>

</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let currentTool='select';
let drawing=false;
let currentLine;
let selectedObject=null;
let undoStack=[];
let redoStack=[];

const stage = new Konva.Stage({
  container:'stage-parent',
  width:3000,
  height:2000,
  draggable:true
});

const backgroundLayer = new Konva.Layer();
const fiberLayer = new Konva.Layer();
const networkLayer = new Konva.Layer();
const cctvLayer = new Konva.Layer();
const powerLayer = new Konva.Layer();
const devicesLayer = new Konva.Layer();

stage.add(backgroundLayer);
stage.add(fiberLayer);
stage.add(networkLayer);
stage.add(cctvLayer);
stage.add(powerLayer);
stage.add(devicesLayer);

function setTool(tool){
  currentTool=tool;
}

function getLineStyle(tool){

  switch(tool){
    case 'fiber':
      return {stroke:'orange',dash:[],width:4,layer:fiberLayer};

    case 'network':
      return {stroke:'deepskyblue',dash:[],width:3,layer:networkLayer};

    case 'cctv':
      return {stroke:'limegreen',dash:[10,5],width:3,layer:cctvLayer};

    case 'power':
      return {stroke:'red',dash:[],width:5,layer:powerLayer};

    case 'measure':
      return {stroke:'yellow',dash:[5,5],width:2,layer:networkLayer};
  }
}

stage.on('mousedown touchstart',e=>{

  if(currentTool==='select') return;

  const pos=stage.getPointerPosition();
  const style=getLineStyle(currentTool);

  drawing=true;

  currentLine=new Konva.Line({
    points:[pos.x,pos.y,pos.x,pos.y],
    stroke:style.stroke,
    strokeWidth:style.width,
    lineCap:'round',
    lineJoin:'round',
    dash:style.dash,
    draggable:true
  });

  style.layer.add(currentLine);
  saveState();
});

stage.on('mousemove touchmove',()=>{

  if(!drawing || !currentLine) return;

  const pos=stage.getPointerPosition();
  const points=currentLine.points();

  currentLine.points([
    points[0],
    points[1],
    pos.x,
    pos.y
  ]);

});

stage.on('mouseup touchend',()=>{
  drawing=false;
});

function addDevice(type){

  let label='';
  let color='white';

  switch(type){
    case 'camera':
      label='📷';
      color='lime';
      break;

    case 'ptz':
      label='🎥';
      color='cyan';
      break;

    case 'rack':
      label='🗄';
      color='orange';
      break;

    case 'switch':
      label='🖧';
      color='deepskyblue';
      break;

    case 'router':
      label='📡';
      color='violet';
      break;

    case 'wifi':
      label='📶';
      color='skyblue';
      break;

    case 'door':
      label='🚪';
      color='magenta';
      break;

    case 'barrier':
      label='⛔';
      color='red';
      break;

    case 'nvr':
      label='💽';
      color='yellow';
      break;

    case 'manhole':
      label='⭕';
      color='brown';
      break;

    case 'pole':
      label='📍';
      color='white';
      break;
  }

  const text=new Konva.Text({
    x:300,
    y:200,
    text:label,
    fontSize:34,
    draggable:true,
    fill:color
  });

  text.on('click tap',()=>{
    selectedObject=text;
  });

  devicesLayer.add(text);
  devicesLayer.draw();

  saveState();
}

function toggleLayer(layer){

  const layers={
    fiber:fiberLayer,
    network:networkLayer,
    cctv:cctvLayer,
    power:powerLayer,
    devices:devicesLayer
  };

  const l=layers[layer];

  l.visible(!l.visible());
  l.draw();
}

function clearCanvas(){

  fiberLayer.destroyChildren();
  networkLayer.destroyChildren();
  cctvLayer.destroyChildren();
  powerLayer.destroyChildren();
  devicesLayer.destroyChildren();

  fiberLayer.draw();
  networkLayer.draw();
  cctvLayer.draw();
  powerLayer.draw();
  devicesLayer.draw();

  saveState();
}

function saveState(){
  undoStack.push(stage.toJSON());
}

function undo(){

  if(undoStack.length<2) return;

  redoStack.push(undoStack.pop());

  const previous=undoStack[undoStack.length-1];

  stage.destroyChildren();

  const newStage=Konva.Node.create(previous,'stage-parent');

}

function redo(){
  if(redoStack.length===0) return;
}

async function exportPDF(){

  const dataURL=stage.toDataURL({pixelRatio:2});

  const {jsPDF}=window.jspdf;

  const pdf=new jsPDF('landscape','px',[3000,2000]);

  pdf.addImage(dataURL,'PNG',0,0,3000,2000);

  pdf.save('network-layout.pdf');
}

const upload=document.getElementById('pdfUpload');

upload.addEventListener('change',async(e)=>{

  const file=e.target.files[0];

  if(!file) return;

  const fileType=file.type;

  if(fileType==='application/pdf'){

    const reader=new FileReader();

    reader.onload=async function(){

      const typedarray=new Uint8Array(this.result);

      const pdf=await pdfjsLib.getDocument(typedarray).promise;

      const page=await pdf.getPage(1);

      const viewport=page.getViewport({scale:2});

      const canvas=document.createElement('canvas');
      const context=canvas.getContext('2d');

      canvas.width=viewport.width;
      canvas.height=viewport.height;

      await page.render({
        canvasContext:context,
        viewport:viewport
      }).promise;

      const imageObj=new Image();

      imageObj.onload=function(){

        backgroundLayer.destroyChildren();

        const bg=new Konva.Image({
          image:imageObj,
          x:0,
          y:0,
          width:viewport.width,
          height:viewport.height
        });

        backgroundLayer.add(bg);
        backgroundLayer.draw();
      }

      imageObj.src=canvas.toDataURL();
    }

    reader.readAsArrayBuffer(file);

  }else{

    const reader=new FileReader();

    reader.onload=function(ev){

      const imageObj=new Image();

      imageObj.onload=function(){

        backgroundLayer.destroyChildren();

        const bg=new Konva.Image({
          image:imageObj,
          x:0,
          y:0,
          width:imageObj.width,
          height:imageObj.height
        });

        backgroundLayer.add(bg);
        backgroundLayer.draw();
      }

      imageObj.src=ev.target.result;
    }

    reader.readAsDataURL(file);
  }
});

saveState();

</script>

</body>
  </html>
