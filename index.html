<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Network Layout PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/konva/9.3.11/konva.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0f172a;
  color:white;
  font-family:Arial;
  touch-action:none;
}

body{
  position:fixed;
  inset:0;
}

#app{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* TOP BAR */
#toolbar{
  height:55px;
  background:#111827;
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  overflow-x:auto;
  white-space:nowrap;
  border-bottom:1px solid #1e293b;
}

button,input{
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  padding:8px 10px;
  font-size:12px;
  flex-shrink:0;
}

button:active{
  transform:scale(0.96);
}

/* MAIN */
#main{
  flex:1;
  display:flex;
  overflow:hidden;
  position:relative;
}

/* SIDEBAR */
#sidebar{
  width:240px;
  background:#111827;
  border-right:1px solid #1e293b;
  overflow-y:auto;
  padding:12px;
  transition:0.3s;
  position:relative;
  z-index:50;
}

.section{
  margin-bottom:20px;
}

.section h3{
  color:#38bdf8;
  margin-bottom:10px;
}

.device-btn{
  width:100%;
  margin-bottom:6px;
  text-align:left;
}

/* CANVAS */
#canvas-container{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#1e293b;
}

#stage-parent{
  width:100%;
  height:100%;
  touch-action:none;
}

/* PROPERTIES */
#properties{
  position:absolute;
  top:10px;
  right:10px;
  width:200px;
  background:#111827;
  border:1px solid #334155;
  padding:10px;
  border-radius:12px;
  z-index:100;
}

#properties input{
  width:100%;
  margin-bottom:8px;
  font-size:12px;
  padding:6px;
}

/* MOBILE MENU */
#menuBtn{
  display:none;
  position:absolute;
  bottom:10px;
  left:10px;
  width:50px;
  height:50px;
  border-radius:50%;
  font-size:20px;
  background:#38bdf8;
  z-index:200;
}

/* MOBILE */
@media(max-width:768px){

  #sidebar{
    position:absolute;
    left:-260px;
    top:0;
    bottom:0;
    width:220px;
  }

  #sidebar.show{
    left:0;
  }

  #menuBtn{
    display:block;
  }

  #properties{
    width:150px;
  }
}

</style>
</head>

<body>

<div id="app">

<div id="toolbar">

<input type="file" id="pdfUpload" accept="application/pdf,image/*"/>

<button onclick="setTool('select')">Select</button>
<button onclick="setTool('fiber')">Fiber</button>
<button onclick="setTool('network')">Network</button>
<button onclick="setTool('cctv')">CCTV</button>
<button onclick="setTool('power')">Power</button>

<button onclick="clearCanvas()">Clear</button>
<button onclick="exportPDF()">Export</button>

</div>

<div id="main">

<div id="sidebar">

<div class="section">
<h3>Devices</h3>

<button class="device-btn" onclick="addDevice('camera')">📷 Camera</button>
<button class="device-btn" onclick="addDevice('rack')">🗄 Rack</button>
<button class="device-btn" onclick="addDevice('switch')">🖧 Switch</button>
<button class="device-btn" onclick="addDevice('router')">📡 Router</button>
<button class="device-btn" onclick="addDevice('wifi')">📶 AP</button>
<button class="device-btn" onclick="addDevice('door')">🚪 Door</button>
<button class="device-btn" onclick="addDevice('barrier')">⛔ Gate</button>
<button class="device-btn" onclick="addDevice('nvr')">💽 NVR</button>
<button class="device-btn" onclick="addDevice('manhole')">⭕ Manhole</button>

</div>

</div>

<div id="canvas-container">

<button id="menuBtn" onclick="toggleSidebar()">☰</button>

<div id="properties">
<h3>Properties</h3>
<input placeholder="Name"/>
<input placeholder="IP"/>
<input placeholder="Note"/>
</div>

<div id="stage-parent"></div>

</div>

</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let tool='select';
let drawing=false;
let line;

const stage = new Konva.Stage({
  container:'stage-parent',
  width:window.innerWidth,
  height:window.innerHeight,
  draggable:true
});

const layers={
  fiber:new Konva.Layer(),
  network:new Konva.Layer(),
  cctv:new Konva.Layer(),
  power:new Konva.Layer(),
  device:new Konva.Layer(),
  bg:new Konva.Layer()
};

Object.values(layers).forEach(l=>stage.add(l));

function setTool(t){tool=t;}

function getStyle(t){
  if(t==='fiber') return {c:'orange',w:4,l:layers.fiber};
  if(t==='network') return {c:'deepskyblue',w:3,l:layers.network};
  if(t==='cctv') return {c:'limegreen',w:3,l:layers.cctv};
  if(t==='power') return {c:'red',w:5,l:layers.power};
}

stage.on('mousedown touchstart',e=>{
  if(tool==='select') return;

  const p=stage.getPointerPosition();
  const s=getStyle(tool);

  drawing=true;

  line=new Konva.Line({
    points:[p.x,p.y,p.x,p.y],
    stroke:s.c,
    strokeWidth:s.w,
    lineCap:'round'
  });

  s.l.add(line);
});

stage.on('mousemove touchmove',()=>{
  if(!drawing||!line) return;

  const p=stage.getPointerPosition();
  let pts=line.points();

  line.points([pts[0],pts[1],p.x,p.y]);
});

stage.on('mouseup touchend',()=>drawing=false);

function addDevice(type){

  const iconMap={
    camera:'📷',
    rack:'🗄',
    switch:'🖧',
    router:'📡',
    wifi:'📶',
    door:'🚪',
    barrier:'⛔',
    nvr:'💽',
    manhole:'⭕'
  };

  const g=new Konva.Group({
    x:200,
    y:200,
    draggable:true
  });

  const text=new Konva.Text({
    text:iconMap[type],
    fontSize:30,
    fill:'white'
  });

  g.add(text);
  layers.device.add(g);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('show');
}

function clearCanvas(){
  Object.values(layers).forEach(l=>l.destroyChildren());
}

function exportPDF(){

  const data=stage.toDataURL({pixelRatio:2});

  const {jsPDF}=window.jspdf;

  const pdf=new jsPDF('landscape','px',[2000,1200]);

  pdf.addImage(data,'PNG',0,0,2000,1200);

  pdf.save('layout.pdf');
}

window.addEventListener('resize',()=>{
  stage.width(window.innerWidth);
  stage.height(window.innerHeight);
});

</script>

</body>
  </html>
