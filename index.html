<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Report Pro</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 12px;
  max-width: 600px;
  margin: auto;
}

h2 {
  text-align: center;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

textarea {
  height: 80px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-size: 15px;
}

#gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 10px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 12px;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  transition: opacity 0.25s ease;
}

.fade {
  opacity: 0.3;
}

.row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.row button {
  flex: 1;
  background: #334155;
  font-size: 12px;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 Job Report</h2>

<input id="title" placeholder="Location">

<!-- ADDED JOB TYPE SELECT -->
<select id="jobType">
  <option value="New Installation">New Installation</option>
  <option value="Repair / Maintenance">Repair / Maintenance</option>
</select>

<textarea id="desc" placeholder="Job Description"></textarea>

<input type="file" id="images" multiple accept="image/*">

<div id="gallery"></div>

<button onclick="generatePDF()">📥 Generate PDF</button>

</div>

<script>
const { jsPDF } = window.jspdf;

let imagesData = [];

/* ================= FAST UPLOAD ================= */
document.getElementById("images").addEventListener("change", async (e) => {
  const files = Array.from(e.target.files);

  for (let file of files) {

    const compressed = await compressImage(file);

    imagesData.push({
      src: compressed,
      type: "before"
    });
  }

  render();
});

/* ================= RENDER ================= */
function render() {
  const g = document.getElementById("gallery");
  g.innerHTML = "";

  imagesData.forEach((img, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img id="img-${i}" src="${img.src}">
      
      <div class="row">
        <button onclick="toggle(${i})">
          ${img.type.toUpperCase()}
        </button>

        <button onclick="removeImg(${i})">Delete</button>
      </div>
    `;

    g.appendChild(div);
  });
}

/* ================= TOGGLE ================= */
function toggle(i) {
  const img = document.getElementById("img-" + i);
  img.classList.add("fade");

  setTimeout(() => {
    imagesData[i].type =
      imagesData[i].type === "before" ? "after" : "before";

    img.classList.remove("fade");
    render();
  }, 120);
}

/* ================= REMOVE ================= */
function removeImg(i) {
  imagesData.splice(i, 1);
  render();
}

/* ================= GROUP PAIRS ================= */
function getPairs() {
  const before = imagesData.filter(i => i.type === "before");
  const after = imagesData.filter(i => i.type === "after");

  const max = Math.max(before.length, after.length);
  const pairs = [];

  for (let i = 0; i < max; i++) {
    pairs.push({
      before: before[i],
      after: after[i]
    });
  }

  return pairs;
}

/* ================= PDF ================= */
function generatePDF() {
  const title = document.getElementById("title").value;
  const jobType = document.getElementById("jobType").value;
  const desc = document.getElementById("desc").value;

  if (!title || !desc) {
    alert("Fill all fields");
    return;
  }

  const pdf = new jsPDF("p", "mm", "a4");

  const margin = 10;
  const pageW = 210;

  const imgW = (pageW - margin * 3) / 2;
  const imgH = 70;

  const pairs = getPairs();

  let page = 1;
  const lineHeight = 5;

  for (let i = 0; i < pairs.length; i += 2) {

    if (i !== 0) pdf.addPage();

    let y;

    // ✅ ONLY FIRST PAGE SHOW TEXT
    if (i === 0) {
      pdf.setFontSize(14);
      pdf.text("Location: " + title, margin, 15);

      pdf.setFontSize(11);
      pdf.text("Type: " + jobType, margin, 21);

      pdf.setFontSize(10);
      const descLines = pdf.splitTextToSize(desc, 180);
      pdf.text(descLines, margin, 28);

      const descHeight = descLines.length * lineHeight;
      y = 28 + descHeight + 8;

    } else {
      // ✅ NEXT PAGES START HIGHER (NO TEXT)
      y = 20;
    }

    // DRAW IMAGES
    draw(pdf, pairs[i], y, imgW, imgH, margin);

    if (pairs[i + 1]) {
      draw(pdf, pairs[i + 1], y + imgH + 18, imgW, imgH, margin);
    }

    pdf.setFontSize(10);
    pdf.text("Page " + page++, 180, 290);
  }

  pdf.save("job-report.pdf");
      }

/* ================= DRAW PAIR ================= */
function draw(pdf, p, y, w, h, m) {

  // clean label spacing
  pdf.setFontSize(11);

  pdf.text("Before", m, y);
  pdf.text("After", m + w + m, y);

  const imgY = y + 5;

  if (p.before)
    pdf.addImage(p.before.src, "JPEG", m, imgY, w, h);

  if (p.after)
    pdf.addImage(p.after.src, "JPEG", m + w + m, imgY, w, h);

  // border
  pdf.rect(m, imgY, w, h);
  pdf.rect(m + w + m, imgY, w, h);
}

const jobTypeSelect = document.getElementById("jobType");
const descField = document.getElementById("desc");

jobTypeSelect.addEventListener("change", () => {
  if (jobTypeSelect.value === "Repair / Maintenance") {
    descField.placeholder = "Issue:\n- \n\nSolution:\n- ";
    descField.value = "Issue:\n- \n\nSolution:\n- ";
  } else {
    descField.placeholder = "Job Description";
    descField.value = "";
  }
});


async function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = (e) => {
      img.src = e.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement("canvas");

      // 🔥 resize (important)
      const maxWidth = 1000;
      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // 🔥 compress quality (0.6 = sweet spot)
      const compressedData = canvas.toDataURL("image/jpeg", 0.6);

      resolve(compressedData);
    };

    reader.readAsDataURL(file);
  });
        }

      
</script>

</body>
  </html>
