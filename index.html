<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Network Layout PRO Fiber Core</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/konva/9.3.11/konva.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0f172a;
  color:white;
  font-family:Arial;
  touch-action:none;
}

body{
  position:fixed;
  inset:0;
}

/* TOP BAR */
#toolbar{
  height:55px;
  background:#111827;
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  overflow-x:auto;
  white-space:nowrap;
}

button,select{
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  padding:8px 10px;
  font-size:12px;
}

/* CANVAS */
#stage{
  width:100%;
  height:calc(100% - 55px);
  background:#1e293b;
}

</style>
</head>

<body>

<div id="toolbar">

<select id="fiberCore">
  <option value="1">1 Core</option>
  <option value="2">2 Core</option>
  <option value="4">4 Core</option>
  <option value="6">6 Core</option>
  <option value="8">8 Core</option>
  <option value="12">12 Core</option>
</select>

<button onclick="setTool('fiber')">Fiber</button>
<button onclick="setTool('move')">Move</button>

</div>

<div id="stage"></div>

<script>

const stage = new Konva.Stage({
  container:'stage',
  width:window.innerWidth,
  height:window.innerHeight,
  draggable:true
});

const layer = new Konva.Layer();
stage.add(layer);

let tool='move';
let drawing=false;
let activeGroup=null;

function setTool(t){
  tool=t;
}

// Fiber core colors (telecom standard style)
const fiberColors = [
  'red','blue','yellow','green','orange','purple',
  'cyan','magenta','lime','white','pink','brown'
];

function getColors(n){
  return fiberColors.slice(0,n);
}

stage.on('mousedown touchstart',()=>{

  if(tool!=='fiber') return;

  const pos = stage.getPointerPosition();

  const cores = parseInt(document.getElementById('fiberCore').value);
  const colors = getColors(cores);

  const group = new Konva.Group({
    draggable:true
  });

  for(let i=0;i<cores;i++){

    const line = new Konva.Line({
      points:[pos.x, pos.y + (i*3), pos.x, pos.y + (i*3)],
      stroke:colors[i],
      strokeWidth:2,
      lineCap:'round'
    });

    group.add(line);
  }

  layer.add(group);
  activeGroup=group;
  drawing=true;

});

stage.on('mousemove touchmove',()=>{

  if(!drawing || !activeGroup || tool!=='fiber') return;

  const pos = stage.getPointerPosition();

  const lines = activeGroup.getChildren();

  lines.forEach((l,i)=>{

    const pts = l.points();

    l.points([
      pts[0],
      pts[1],
      pos.x,
      pos.y + (i*3)
    ]);

  });

});

stage.on('mouseup touchend',()=>{

  drawing=false;
  activeGroup=null;

});

window.addEventListener('resize',()=>{

  stage.width(window.innerWidth);
  stage.height(window.innerHeight);

});

</script>

</body>
  </html>
